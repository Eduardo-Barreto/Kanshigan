name: Build Documents

on:
  push:
    branches: [main]
    paths:
      - docs/paper/**
      - docs/projeto-de-pesquisa/**
      - docs/project-plan/**
      - .github/workflows/build-paper.yml

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: typst-community/setup-typst@v4

      - name: Install fonts
        run: |
          sudo apt-get install -y fonts-texgyre
          mkdir -p ~/.local/share/fonts
          curl -fsSL -o ~/.local/share/fonts/Manrope.ttf \
            "https://raw.githubusercontent.com/google/fonts/main/ofl/manrope/Manrope%5Bwght%5D.ttf"
          fc-cache -fv

      - name: Compile Paper
        run: typst compile docs/paper/main.typ docs/paper/kanshigan.pdf

      - name: Compile Projeto de Pesquisa
        run: typst compile docs/projeto-de-pesquisa/main.typ docs/projeto-de-pesquisa/projeto-de-pesquisa.pdf

      - name: Upload Paper
        uses: actions/upload-artifact@v4
        with:
          name: kanshigan-paper
          path: docs/paper/kanshigan.pdf

      - name: Upload Projeto de Pesquisa
        uses: actions/upload-artifact@v4
        with:
          name: projeto-de-pesquisa
          path: docs/projeto-de-pesquisa/projeto-de-pesquisa.pdf

      - name: Compile Project Plan
        run: typst compile docs/project-plan/main.typ docs/project-plan/project-plan.pdf

      - name: Upload Project Plan
        uses: actions/upload-artifact@v4
        with:
          name: project-plan
          path: docs/project-plan/project-plan.pdf
