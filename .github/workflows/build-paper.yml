name: Build Documents

on:
  push:
    branches: [main]
    paths:
      - paper/**
      - projeto-de-pesquisa/**
      - project-plan/**

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: typst-community/setup-typst@v4

      - name: Install fonts
        run: |
          sudo apt-get install -y fonts-texgyre
          mkdir -p ~/.local/share/fonts
          curl -fsSL -o /tmp/manrope.zip "https://fonts.google.com/download?family=Manrope"
          unzip -o /tmp/manrope.zip -d ~/.local/share/fonts/manrope
          fc-cache -fv

      - name: Compile Paper
        run: typst compile paper/main.typ paper/kanshigan.pdf

      - name: Compile Projeto de Pesquisa
        run: typst compile projeto-de-pesquisa/main.typ projeto-de-pesquisa/projeto-de-pesquisa.pdf

      - name: Upload Paper
        uses: actions/upload-artifact@v4
        with:
          name: kanshigan-paper
          path: paper/kanshigan.pdf

      - name: Upload Projeto de Pesquisa
        uses: actions/upload-artifact@v4
        with:
          name: projeto-de-pesquisa
          path: projeto-de-pesquisa/projeto-de-pesquisa.pdf

      - name: Compile Project Plan
        run: typst compile project-plan/main.typ project-plan/project-plan.pdf

      - name: Upload Project Plan
        uses: actions/upload-artifact@v4
        with:
          name: project-plan
          path: project-plan/project-plan.pdf
